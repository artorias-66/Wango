name: CD

on:
  push:
    branches: [main]

# Only run CD after CI passes on the same commit
# CI is triggered separately; this workflow gates on its own checks
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build & Push Images to GHCR ─────────────────────────────
  push-images:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    # Required for GHCR push with GITHUB_TOKEN
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/wango-backend
            ghcr.io/${{ github.repository_owner }}/wango-frontend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # ─── Backend Image ────────────────────────────────────────
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wango-backend:latest
            ghcr.io/${{ github.repository_owner }}/wango-backend:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ─── Frontend Image ───────────────────────────────────────
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wango-frontend:latest
            ghcr.io/${{ github.repository_owner }}/wango-frontend:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
            VITE_API_URL=
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─── Deploy ───────────────────────────────────────────────────
  deploy:
    name: Trigger Deployment
    runs-on: ubuntu-latest
    needs: push-images
    steps:
      - name: Trigger deploy webhook
        env:
          HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL || vars.DEPLOY_HOOK_URL }}
        if: env.HOOK_URL != ''
        run: |
          curl -f -X POST "${HOOK_URL}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.sha }}","repo":"${{ github.repository }}"}'
        continue-on-error: true
