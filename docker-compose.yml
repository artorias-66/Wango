# Wango — Development Docker Compose

services:
  # ─── PostGIS Database ──────────────────────────────────────────────────────
  db:
    image: postgis/postgis:13-3.4
    container_name: wango_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: wango_db
    ports:
      - "5433:5432"
    volumes:
      - wango_data:/var/lib/postgresql/data
    networks:
      - wango_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wango_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    image: node:22-alpine
    container_name: wango_backend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    environment:
      # Internal Docker DNS — backend talks to db container directly on 5432
      DATABASE_URL: postgresql://postgres:your_password@db:5432/wango_db?schema=public
      PORT: 3001
      CORS_ORIGIN: http://localhost:5173
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - wango_network
    volumes:
      # Mount source for hot-reload in dev
      - ./backend:/app
      - /app/node_modules

  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: wango_frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - wango_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

# ─── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wango_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - wango_network

# ─── Shared Network ─────────────────────────────────────────────────────────
networks:
  wango_network:
    driver: bridge

# ─── Persistent Volumes ─────────────────────────────────────────────────────
volumes:
  wango_data:
